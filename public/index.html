<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TARA Safety Intelligence</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- TOP BAR -->
<div class="topBar">

<button id="menuBtn" class="menuBtn">☰</button>
<button id="closeMenu" class="closeMenu">✕</button>

<div class="title">
TARA SAFETY INTELLIGENCE
</div>

</div>



<!-- EMERGENCY FIXED CENTER -->
<div class="emergencyWrap">

<button id="emergencyBtn" class="emergencyBtn">

🚨

<div class="holdLabel">
HOLD EMERGENCY
</div>

<div id="holdBar" class="holdBar"></div>

</button>

</div>



<!-- CHAT AREA -->
<div class="container">

<div id="response" class="response"></div>

<div id="thinking" class="thinking hidden">
<span></span><span></span><span></span>
</div>


<input
id="question"
class="question"
placeholder="Ask towing safety question..."
>


<div class="buttonRow">

<button id="askBtn" class="sendBtn">
SEND
</button>

<button id="voiceBtn" class="voiceBtn">
🎤 TALK
</button>

</div>


<div class="footer">
Powered by Safety Intelligence<br>
© Safety Buzz Alerts
</div>

</div>



<!-- MENU -->
<div id="menuOverlay" class="menuOverlay hidden">

<div class="menuBox">

<button id="closeMenu" class="closeMenu">
✕
</button>

<h2>MENU</h2>

<label>
<input type="checkbox" checked>
Voice Enabled
</label>

<br><br>

<label>
<input type="checkbox">
GPS Enabled
</label>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
