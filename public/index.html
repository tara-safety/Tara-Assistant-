<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TARA Safety Intelligence</title>

<link rel="stylesheet" href="style.css">

</head>
<body>


<!-- HEADER (fixed) -->
<div class="header">
  <button class="menuBtn">☰</button>
  <h1>DASHBOARD</h1>
</div>

<div class="content">

  <div class="emergency-section">
    <button id="emergencyBtn" class="emergencyBtn">
      EMERGENCY
    </button>
    <div class="holdText">Hold for 3 seconds</div>
  </div>

  <div class="chatCard">
    <b>TARA:</b> 
  </div>

  <input class="inputBox" placeholder="TYPE YOUR MESSAGE HERE">

  <div class="btnRow">
    <button class="sendBtn">SEND</button>
    <button class="talkBtn">SPEAK</button>
  </div>

  <div class="driverAlert">
    <span class="icon">⚠</span>
    ACTIVATE DRIVER MINDER
  </div>

</div>


<script src="script.js"></script>

</body>
</html>
