<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TARA Safety Intelligence</title>
  <link rel="stylesheet" href="app.css?v=3" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e9f4f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>
<body>

  <div class="header">
    <button id="menuBtn">☰</button>
    <span>T.A.R.A SAFETY</span>
  </div>

  <div class="menu">
    <a href="/">TARA App</a>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/dispatcher.html">Dispatcher</a>
  </div>

  <div class="main">

    <div class="emergencyWrap">
      <button id="emergencyBtn" class="emergencyBtn">
        🚨<br />
        HOLD<br />
        EMERGENCY
      </button>
    </div>

    <div class="holdText">Hold for 3 seconds</div>

    <button id="emergencyMiniBtn" class="emergencyMiniBtn">🚨 SOS</button>

    <div id="contextCard" class="statusCard">
      <div id="contextText">Context: Idle</div>
      <div id="riskText">Risk: Normal</div>
      <div id="soundText">Sound Watch: Off</div>
      <div id="driverMinderText">Roadside Protection: Off</div>
    </div>

    <div id="contextBadge" class="contextBadge">⚪ IDLE</div>
    <div id="motionDebug" class="motionDebug">Motion: 0.00 | Score: 0 | Mode: IDLE</div>

    <div class="chatBox" id="chatBox"></div>

    <textarea
      id="question"
      class="messageInput"
      placeholder="Ask towing safety question..."
    ></textarea>

    <div class="buttonRow">
      <button id="askBtn">SEND</button>
      <button id="voiceBtn">🎤 TALK</button>
    </div>

    <div class="buttonRow">
      <button id="towModeBtn">Tow Mode OFF</button>
      <button id="towCameraBtn">📷 Camera</button>
    </div>

    <div class="buttonRow">
      <button id="proModeBtn">PRO MODE OFF</button>
    </div>

    <button id="driverMinderBtn" class="driverMinderBtn">
      ROADSIDE PROTECTION OFF
    </button>

    <div class="voiceRow">
      <label class="voiceToggleWrap">
        <span>Voice Response</span>
        <input type="checkbox" id="voiceToggle" checked />
      </label>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
