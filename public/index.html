<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T.A.R.A Safety Assistant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- EMERGENCY BUTTON -->
    <div class="emergency-section">
        <button id="emergencyBtn">PRESS & HOLD EMERGENCY</button>
        <div id="status"></div>
    </div>

    <!-- CHAT -->
    <div class="chat-section">

        <div id="chat"></div>

        <div class="input-row">
            <input id="question" type="text" placeholder="Ask TARA safety question...">
            <button id="askBtn">Send</button>
            <button id="voiceBtn">Talk</button>
        </div>

    </div>

    <!-- LOGO -->
    <div class="logo-section">
        <img src="taralogo.jpg" id="logo">
        <div class="powered">Powered by Safety Intelligence</div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
