<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TARA Safety Intelligence</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1e9f4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

</head>
<body>
  
<div class="emergencySection">
  <div class="emergencyWrap">
    <button id="emergencyBtn" class="emergencyBtn">
      <span class="emgIcon">🚨</span>
      <div class="emgLine">HOLD</div>
      <div class="emgLine">EMERGENCY</div>
    </button>
  </div>

  <div class="holdText">Hold for 3 seconds</div>
</div>

<button id="emergencyMiniBtn" class="emergencyMiniBtn">🚨 SOS</button>
  
<div class="header">
<button id="menuBtn">☰</button>
<span>DASHBOARD</span>
</div>

<div id="menu" class="menu">
<button id="closeMenu">✕</button>
<h3>Menu</h3>
</div>

<div id="contextCard" class="context-card">
  <div id="contextText">Context: Idle</div>
  <div id="riskText">Risk: Normal</div>
  <div id="soundText">Sound Watch: Off</div>
</div>
  
<div class="main">

<div id="contextBadge" class="contextBadge">⚪ IDLE</div>
<div id="motionDebug" class="motionDebug">
  Motion: 0 | Score: 0 | Mode: IDLE
</div>
  
<div id="chatBox" class="chatBox"></div>

<input id="question"class="messageInput"placeholder="Ask towing safety question..."
>
<label class="voiceToggle">
<input type="checkbox" id="voiceToggle" checked>
Voice Response
</label>

<button id="voiceBtn">🎤 TALK</button>
  
<div class="buttonRow">
<button id="askBtn">SEND</button>
<button id="voiceBtn">🎤 TALK</button>
</div>

<button id="towCameraBtn">📷 Tow Camera AI</button>        

<div id="driverMinderBtn" class="driverMinder">

DRIVER MINDER OFF
</div>

<button id="highRiskBtn" class="highRiskBtn">HIGH-RISK MODE OFF</button>
  
<button id="emergencyMiniBtn" class="emergencyMiniBtn">🚨 SOS</button>

</div>

<script type="module" src="/app.js"></script>

</body>
</html>
