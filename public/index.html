<h2>Driver Emergency Alerts</h2>

<div id="alerts"></div>

<script>

async function loadAlerts() {

  const res = await fetch("/alerts");
  const alerts = await res.json();

  const container = document.getElementById("alerts");

  container.innerHTML = "";

  alerts.forEach(alert => {

  const div = document.createElement("div");

  const mapLink = `https://maps.google.com/?q=${alert.latitude},${alert.longitude}`;

  div.innerHTML = `
    <b>${alert.driver}</b><br>
    Location: <a href="${mapLink}" target="_blank">Open Map</a><br>
    new Date(alert.created_at).toLocaleString()}<br>
    <hr>
  `;

  container.appendChild(div);

});

}

loadAlerts();

alerts.forEach(alert => {

  L.marker([alert.latitude, alert.longitude])
    .addTo(map)
    .bindPopup(`${alert.driver} emergency`);

});
/* refresh every 5 seconds */

setInterval(loadAlerts, 5000);

</script>
