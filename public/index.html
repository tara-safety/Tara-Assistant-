<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TARA Safety Intelligence</title>

<link rel="stylesheet" href="style.css">

</head>
<body>


<!-- HEADER (fixed) -->
<div class="header">

<button id="menuBtn" class="menuBtn">☰</button>

<div class="headerTitle">
TARA SAFETY INTELLIGENCE
</div>

</div>



<!-- SLIDE MENU -->
<div id="menu" class="menu">

<button id="closeMenu" class="closeMenu">✕</button>

<h2>Menu</h2>

<label class="menuItem">
Wake Voice
<input type="checkbox" id="wakeToggle" checked>
</label>

<label class="menuItem">
Emergency GPS
<input type="checkbox" id="gpsToggle" checked>
</label>

</div>



<!-- MAIN -->
<div class="main">


<!-- EMERGENCY BUTTON -->
<div class="emergencyWrap">

<div id="emergencyBtn" class="emergencyBtn">

<div class="progressCircle" id="progressCircle"></div>

<div class="emgText">
🚨<br>
HOLD<br>
EMERGENCY
</div>

</div>

<div class="holdText">
Hold for 3 seconds
</div>

</div>



<!-- CHAT BOX -->
<div id="chatBox" class="chatBox"></div>



<!-- INPUT -->
<input
id="question"
class="input"
placeholder="Ask towing safety question..."
>



<!-- BUTTONS -->
<div class="btnRow">

<button id="askBtn" class="sendBtn">
SEND
</button>

<button id="voiceBtn" class="talkBtn">
🎤 TALK
</button>

</div>



<div class="footer">
Powered by Safety Intelligence<br>
© Safety Buzz Alerts
</div>


</div>


<script src="script.js"></script>

</body>
</html>
