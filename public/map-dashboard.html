<html>

<head>
<meta charset="UTF-8">
<title>TARA Driver Emergency Dashboard</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
}

h2{
  padding:15px;
  background:#111;
  color:white;
  margin:0;
}

#map{
  height:90vh;
  width:100%;
}

</style>

</head>

<body>

<h2>TARA Driver Emergency Map</h2>

<div id="map"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* --------------------------
SUPABASE CONNECTION
--------------------------- */

const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

let map;
let markers = [];

/* --------------------------
LOAD EXISTING ALERTS
--------------------------- */

async function loadAlerts(){

  const res = await fetch("/alerts");
  const alerts = await res.json();

  alerts.forEach(alert => {

    const position = {
      lat: parseFloat(alert.latitude),
      lng: parseFloat(alert.longitude)
    };

    const marker = new google.maps.Marker({
      position: position,
      map: map,
      title: alert.driver || "Driver"
    });

    markers.push(marker);

  });

}

/* --------------------------
REALTIME ALERT LISTENER
--------------------------- */

function startRealtime(){

  supabase
  .channel("alerts-channel")
  .on(
    "postgres_changes",
    { event:"INSERT", schema:"public", table:"alerts" },
    payload => {

      const alert = payload.new;

      const position = {
        lat: parseFloat(alert.latitude),
        lng: parseFloat(alert.longitude)
      };

      const marker = new google.maps.Marker({
        position: position,
        map: map,
        title: alert.driver || "Driver"
      });

      markers.push(marker);

      console.log("Realtime alert:", alert);

    }
  )
  .subscribe();

}

/* --------------------------
INITIALIZE MAP
--------------------------- */

function initMap(){

  map = new google.maps.Map(document.getElementById("map"),{
    zoom:5,
    center:{lat:56.1304,lng:-106.3468}
  });

  loadAlerts();
  startRealtime();

}

</script>

<!-- GOOGLE MAPS -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_KEY&callback=initMap">
</script>

</body>

</html>
