<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Near Miss Report</title>

<style>
body { font-family: Arial; padding:20px; max-width:600px; margin:auto; }
input, textarea, button {
  width:100%; margin:10px 0; padding:10px;
}
button {
  background:#1e9f4f;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<h1>Near Miss Reporting</h1>

<form id="reportForm">
  <input type="text" placeholder="Name" id="name" required>
  <input type="text" placeholder="Company" id="company">
  <input type="text" placeholder="Location" id="location">
  <textarea placeholder="Describe the near miss..." id="details" required></textarea>
  <button type="submit">Submit Report</button>
</form>

<script>
const AGREEMENT_KEY = "tara_agreement";

function getAgreement() {
  const data = localStorage.getItem(AGREEMENT_KEY);
  if (!data) return null;
  try { return JSON.parse(data); } catch { return null; }
}

document.getElementById("reportForm").addEventListener("submit", function(e){
  e.preventDefault();

  const agreement = getAgreement();

  if (!agreement || !agreement.agreed) {
    alert("You must accept the TARA User Agreement before submitting a report.");
    window.location.href = "/agreement.html";
    return;
  }

  const report = {
    name: document.getElementById("name").value,
    company: document.getElementById("company").value,
    location: document.getElementById("location").value,
    details: document.getElementById("details").value,
    date: new Date().toISOString(),

    // 🔐 AGREEMENT PROOF ATTACHED
    agreementVersion: agreement.version,
    agreementTimestamp: agreement.timestamp,
    device: agreement.userAgent
  };

  console.log("FULL REPORT:", report);

  localStorage.setItem("tara_last_report", JSON.stringify(report));

  alert("Report saved locally (ready for server)");

  this.reset();
});
</script>
</body>
</html>
